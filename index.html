<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ritual Runway Founder Hub</title>
    <style>
      :root {
        color-scheme: light dark;
        --fg: #1a1a1a;
        --muted: #5c5c5c;
        --bg: #fafafa;
        --border: #e5e5e5;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #f0f0f0;
          --muted: #a3a3a3;
          --bg: #121212;
          --border: #2a2a2a;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      main {
        max-width: 36rem;
        text-align: center;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 2rem 1.75rem;
        background: color-mix(in srgb, var(--bg) 92%, var(--fg));
      }
      h1 {
        font-size: 1.35rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.55;
      }
      .hub-resources {
        margin-top: 1.25rem;
        padding-top: 1.25rem;
        border-top: 1px solid var(--border);
      }
      .hub-resources a {
        color: var(--fg);
        font-weight: 500;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      .hub-resources a:hover {
        text-decoration-thickness: 2px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ritual Runway Founder Hub</h1>
      <p>
        Add marketing PDFs, images, and pages to this repository. Connect the repo
        to Vercel for automatic deploys on every push.
      </p>
      <p class="hub-resources">
        <a href="canva-cheat-sheet.html">Canva cheat sheet</a>
        — brand colors, fonts, logo usage, and layout rules (print or save as PDF).
      </p>
    </main>
  </body>
</html>
